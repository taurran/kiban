<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    PENTAGON: Regular pentagon, circumradius R=330, center (512, 490)
    All five sides equal. Vertex pointing up.

    Vertices:
      v0 top:         (512,   160)
      v1 upper-right: (826,   388)
      v2 lower-right: (706,   757)
      v3 lower-left:  (318,   757)
      v4 upper-left:  (198,   388)

    Rounded corners r=26 — computed exactly using edge unit vectors.
    Each corner: line to arc-start, arc radius 26, sweep clockwise, line from arc-end.

    Arc endpoints:
      v0: in=(492.0, 175.3)  out=(532.0, 175.3)
      v1: in=(805.9, 372.9)  out=(817.9, 411.5)
      v2: in=(713.6, 733.1)  out=(680.0, 757.0)
      v3: in=(344.0, 757.0)  out=(310.4, 733.1)
      v4: in=(206.1, 411.5)  out=(218.1, 372.9)
  -->
  <defs>
    <path id="pent" d="
      M 492.0,175.3
      A 26,26 0 0 1 532.0,175.3
      L 805.9,372.9
      A 26,26 0 0 1 817.9,411.5
      L 713.6,733.1
      A 26,26 0 0 1 680.0,757.0
      L 344.0,757.0
      A 26,26 0 0 1 310.4,733.1
      L 206.1,411.5
      A 26,26 0 0 1 218.1,372.9
      Z
    "/>
    <clipPath id="pclip">
      <use href="#pent"/>
    </clipPath>
  </defs>

  <!-- Pentagon fill -->
  <use href="#pent" fill="#1E2640"/>

  <!-- Wireframe keystone group, clipped strictly to pentagon interior -->
  <g clip-path="url(#pclip)" fill="none" stroke-linecap="butt" stroke-linejoin="miter">

    <!--
      KEYSTONE DIMENSIONS:
      Front face — trapezoid, wider at top, narrower at bottom
        Top edge:    480px wide, centered at x=512 → TL(272,345) TR(752,345)
        Bottom edge: 260px wide, centered at x=512 → BL(382,730) BR(642,730)
        Height: 385px

      Back face — identical trapezoid offset +26px right, -26px up (up and right, matching original)
        TL(298,319) TR(778,319)  BL(408,704)  BR(668,704)
    -->

    <!-- BACK FACE — teal, 3px (drawn first so front face renders on top) -->
    <polygon
      points="298,319 778,319 668,704 408,704"
      stroke="#2D7D6F"
      stroke-width="3"/>

    <!-- DEPTH CONNECTORS — white, 3px -->
    <line x1="272" y1="345" x2="298" y2="319" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="752" y1="345" x2="778" y2="319" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="382" y1="730" x2="408" y2="704" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="642" y1="730" x2="668" y2="704" stroke="#FFFFFF" stroke-width="3"/>

    <!-- FRONT FACE — white, 5px (drawn last, on top) -->
    <polygon
      points="272,345 752,345 642,730 382,730"
      stroke="#FFFFFF"
      stroke-width="5"/>

  </g>
</svg>
